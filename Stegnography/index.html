<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Steganography | LSB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🩺 Medical Image Steganography</h1>
        <p>Hide patient data inside medical images using LSB.</p>

        <div class="tabs">
            <button class="tab-btn active" data-mode="hide">Hide Data</button>
            <button class="tab-btn" data-mode="extract">Extract Data</button>
        </div>

        <!-- Hide Mode -->
        <div id="hideMode" class="mode active">
            <div class="form-group">
                <label>Upload Medical Image (PNG/JPEG)</label>
                <input type="file" id="hideImage" accept="image/*">
            </div>
            <div class="form-group">
                <label>Patient Data (JSON or Text)</label>
                <textarea id="patientData" rows="4" placeholder='{"id":"12345","name":"John Doe","diagnosis":"Normal"}'></textarea>
                <small>Data will be embedded in the image.</small>
            </div>
            <div class="form-group">
                <label>Optional: Password (for XOR encryption)</label>
                <input type="password" id="hidePassword" placeholder="Leave empty for no encryption">
            </div>
            <button id="hideBtn" class="btn">Hide & Download Image</button>
            <div id="hideStatus" class="status"></div>
        </div>

        <!-- Extract Mode -->
        <div id="extractMode" class="mode">
            <div class="form-group">
                <label>Upload Stego Image</label>
                <input type="file" id="extractImage" accept="image/*">
            </div>
            <div class="form-group">
                <label>Password (if used during embedding)</label>
                <input type="password" id="extractPassword">
                <small>If the password is wrong, you'll see an error.</small>
            </div>
            <button id="extractBtn" class="btn">Extract Data</button>
            <div id="extractResult" class="result-card" style="display: none;">
                <div class="result-header">
                    <strong>📄 Extracted Data</strong>
                    <button id="copyBtn" class="copy-btn">Copy</button>
                </div>
                <pre id="extractedText" class="extracted-text"></pre>
            </div>
            <div id="extractStatus" class="status"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
